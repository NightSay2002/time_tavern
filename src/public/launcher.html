<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 工具入口</title>
  <style>
    :root {
      --ink: #231a14;
      --muted: #77685b;
      --paper: rgba(255, 250, 239, .86);
      --line: rgba(96, 67, 42, .22);
      --accent: #9b4f1b;
      --accent-dark: #69310e;
      --glow: rgba(155, 79, 27, .18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Songti TC", "Noto Serif TC", "Iowan Old Style", Georgia, serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(224, 153, 79, .28), transparent 34%),
        radial-gradient(circle at 80% 20%, rgba(75, 112, 86, .18), transparent 30%),
        linear-gradient(135deg, #f7efe0 0%, #eadcc6 45%, #d9c2a0 100%);
    }
    .shell {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }
    header {
      margin-bottom: 28px;
    }
    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent-dark);
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      font-size: 13px;
    }
    h1 {
      margin: 0;
      font-size: clamp(36px, 8vw, 78px);
      line-height: .98;
      letter-spacing: -.05em;
    }
    .intro {
      max-width: 780px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.8;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 34px;
    }
    .card {
      position: relative;
      min-height: 230px;
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--paper);
      box-shadow: 0 22px 80px rgba(54, 37, 20, .12);
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: auto -36px -48px auto;
      width: 150px;
      height: 150px;
      border-radius: 999px;
      background: var(--glow);
    }
    .port {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(35, 26, 20, .07);
      color: var(--muted);
      font: 700 13px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    h2 {
      margin: 18px 0 10px;
      font-size: 28px;
      letter-spacing: -.03em;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      color: #fff;
      background: var(--accent);
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(105, 49, 14, .22);
    }
    a.secondary {
      color: var(--accent-dark);
      background: rgba(155, 79, 27, .12);
      box-shadow: none;
    }
    @media (max-width: 760px) {
      .shell { padding: 34px 0; }
      .grid { grid-template-columns: 1fr; }
      .card { min-height: 0; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <p class="eyebrow">Local AI Workspace</p>
      <h1>角色對話入口。</h1>
      <p class="intro">使用 <code>npm run start:all</code> 後，這裡會啟動目前的角色卡、Lorebooks 與 DeepSeek 對話系統。</p>
    </header>

    <section class="grid" aria-label="工具列表">
      <article class="card">
        <span class="port" data-port-label="3234">localhost:3234</span>
        <h2>server_deepseek</h2>
        <p>目前這套角色卡、Lorebooks 與 DeepSeek 對話系統。</p>
        <div class="actions">
          <a class="button" data-local-port="3234" href="/">進入</a>
        </div>
      </article>

    </section>
  </main>
  <script>
    const host = window.location.hostname || "localhost";
    const protocol = window.location.protocol || "http:";
    document.querySelectorAll("[data-local-port]").forEach((link) => {
      const port = link.getAttribute("data-local-port");
      link.href = `${protocol}//${host}:${port}/`;
    });
    document.querySelectorAll("[data-port-label]").forEach((label) => {
      label.textContent = `${host}:${label.getAttribute("data-port-label")}`;
    });
  </script>
</body>
</html>
